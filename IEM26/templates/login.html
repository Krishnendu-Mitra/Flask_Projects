<div class="login">
    <h2>Log IN</h2>
    <form>
        <div class="form-group">
            <label for="access_token">Access Token</label>
            <input type="password" class="form-control" id="access_token" placeholder="Enter secure token" required>
            <small id="access_token" class="form-text text-muted">Please provide our secure token key here, but please don't share it with no authorise persons.</small>
        </div>
        <div class="form-group form-check">
            <input type="checkbox" class="form-check-input" id="check-auth" checked="true">
            <label class="form-check-label" for="check-auth">I am agree with all DBDN usage terms</label>
        </div>
        <div class="flx">
            <dib class="btn btn-danger" onclick="loginPage(1);">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-circle" viewBox="0 0 16 16">
                    <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                    <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
                </svg>
                Close
            </dib>
            <div class="btn btn-info" onclick="unlock();">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-unlock" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M12 0a4 4 0 0 1 4 4v2.5h-1V4a3 3 0 1 0-6 0v2h.5A2.5 2.5 0 0 1 12 8.5v5A2.5 2.5 0 0 1 9.5 16h-7A2.5 2.5 0 0 1 0 13.5v-5A2.5 2.5 0 0 1 2.5 6H8V4a4 4 0 0 1 4-4M2.5 7A1.5 1.5 0 0 0 1 8.5v5A1.5 1.5 0 0 0 2.5 15h7a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 9.5 7z"/>
                </svg>
                Unlock
            </div>
        </div>
    </form>
</div>
